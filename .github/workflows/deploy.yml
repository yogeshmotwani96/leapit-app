name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: |
          cat << EOF > .env.production
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          EOF

      - name: Build Diagnostics
        run: |
          echo "==== Build Diagnostics ===="
          echo "Checking .env.production file..."
          ls -la .env.production
          LINE_COUNT=$(wc -l < .env.production)
          echo "Number of lines in .env.production: $LINE_COUNT"
          URL_LEN=${#VITE_SUPABASE_URL}
          KEY_LEN=${#VITE_SUPABASE_ANON_KEY}
          echo "VITE_SUPABASE_URL detected with length: ${#VITE_SUPABASE_URL}"
          echo "VITE_SUPABASE_ANON_KEY detected with length: ${#VITE_SUPABASE_ANON_KEY}"
          if [ "$LINE_COUNT" -lt 2 ]; then echo "WARNING: .env.production seems truncated!"; fi
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
